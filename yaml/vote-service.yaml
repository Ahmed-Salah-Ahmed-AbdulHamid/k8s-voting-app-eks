apiVersion: v1 
kind: Service
metadata:  
  name: vote-service
  annotations: 
    service.beta.kubernetes.io/aws-load-balancer-scheme: "internet-facing"
spec: 
  type: LoadBalancer
  selector: 
       app: frontend-vote-app
  ports:
  - name: "vote-service"
    port: 8080
    targetPort: 80
      